name: Build Tauri Apps

on:
  push:
    tags:
      - '**@*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Extract App Name
        id: extract
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # Removes the version part: @omnidesk/omni-engine@1.2.0 -> @omnidesk/omni-engine
          PKG="${TAG%@*}"
          # Removes the scope part: @omnidesk/omni-engine -> omni-engine
          APP="${PKG##*/}"
          echo "app=$APP" >> $GITHUB_OUTPUT

      - name: Check if Tauri App
        id: check_tauri
        shell: bash
        run: |
          if [ -d "apps/${{ steps.extract.outputs.app }}/src-tauri" ]; then
            echo "is_tauri=true" >> $GITHUB_OUTPUT
          else
            echo "is_tauri=false" >> $GITHUB_OUTPUT
          fi

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest' && steps.check_tauri.outputs.is_tauri == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        if: steps.check_tauri.outputs.is_tauri == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        if: steps.check_tauri.outputs.is_tauri == 'true'
        uses: pnpm/action-setup@v4

      - name: Install Rust
        if: steps.check_tauri.outputs.is_tauri == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'ubuntu-latest' && 'x86_64-unknown-linux-gnu' || 'x86_64-pc-windows-msvc' }}

      - name: Force default host target by removing local GNU config
        if: steps.check_tauri.outputs.is_tauri == 'true'
        run: rm -f apps/${{ steps.extract.outputs.app }}/src-tauri/.cargo/config.toml
        shell: bash


      - name: Rust cache
        if: steps.check_tauri.outputs.is_tauri == 'true'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/${{ steps.extract.outputs.app }}/src-tauri

      - name: Install Dependencies
        if: steps.check_tauri.outputs.is_tauri == 'true'
        run: pnpm install

      - name: Build Tauri App
        if: steps.check_tauri.outputs.is_tauri == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: ./apps/${{ steps.extract.outputs.app }}
          updaterJsonPreferGithubReleases: true
