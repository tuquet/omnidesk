    <line x1="439" y1="143.25" x2="346" y2="306" stroke="#093B3B" stroke-width="1.2" stroke-linecap="round" opacity="0.5" />
    <line x1="250" y1="250" x2="346" y2="306" stroke="#093B3B" stroke-width="1.2" stroke-linecap="round" opacity="0.5" />
